<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Modbus RTU Reader</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .status { font-weight: bold; color: #d9534f; }
        .data-box { background: #f4f4f4; padding: 15px; margin-top: 10px; border-radius: 5px; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Modbus RTU Serial Reader</h2>
    <p>Status: <span id="status" class="status">Terputus</span></p>
    
    <button id="connectBtn">Hubungkan ke Serial Port</button>
    <button id="readBtn" disabled>Baca Holding Register (40001)</button>

    <div class="data-box">
        <strong>Nilai Register:</strong> <span id="regValue">-</span>
    </div>
</div>

<script>
    let port;
    let reader;

    // Fungsi untuk menghubungkan ke Port Serial
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            // Meminta izin user untuk akses port
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600, dataBits: 8, stopBits: 1, parity: 'none' });
            
            document.getElementById('status').innerText = "Terhubung";
            document.getElementById('status').style.color = "green";
            document.getElementById('readBtn').disabled = false;
        } catch (err) {
            console.error("Gagal membuka port:", err);
            alert("Gagal terhubung ke serial port.");
        }
    });

    // Fungsi sederhana untuk membuat request Modbus RTU (Read Holding Register)
    // Frame: [Slave ID] [Function Code] [Start Addr High] [Low] [Count High] [Low] [CRC L] [CRC H]
    document.getElementById('readBtn').addEventListener('click', async () => {
        if (!port) return;

        const writer = port.writable.getWriter();
        // Contoh: Baca Slave 1, Register 0, Jumlah 1 (Request: 01 03 00 00 00 01 84 0A)
        const request = new Uint8Array([0x01, 0x03, 0x00, 0x00, 0x00, 0x01, 0x84, 0x0A]);
        
        await writer.write(request);
        writer.releaseLock();

        // Membaca respon (Sangat sederhana, disarankan gunakan library Modbus.js untuk produksi)
        const reader = port.readable.getReader();
        try {
            const { value, done } = await reader.read();
            if (value) {
                // Respon Modbus RTU: [ID][FC][ByteCount][Data High][Data Low][CRC][CRC]
                // Data ada di index 3 dan 4
                const val = (value[3] << 8) | value[4];
                document.getElementById('regValue').innerText = val;
            }
        } catch (error) {
            console.error("Read error:", error);
        } finally {
            reader.releaseLock();
        }
    });
</script>
</body>
</html>
